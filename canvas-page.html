<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas-side</title>

    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-content: center;

            margin: 0;
            overflow: hidden;
        }

        canvas {
            background-color: grey;
            border: brown 7px groove;
            cursor: pointer;
        }

        img {
            display: block;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas></canvas>

    </div>

    <img src="./images/cow-icon.png" alt="" id="cow-icon" style="display: none;">
    <!-- none slik at den ikke synes/finnes utenfor canvasen -->

    <script>
        const canvas = document.querySelector("canvas")
        const WIDTH = 1000
        const HEIGHT = 600
        canvas.width = WIDTH
        canvas.height = HEIGHT
        const ctx = canvas.getContext("2d")

        // Deler boksen i drawing- og icon-box
        ctx.moveTo(250, 0) /* høyde: 600 og bredde (iconBox): 250 */
        ctx.lineTo(250, 600)
        ctx.stroke()

        // Lage himmelen
        ctx.fillStyle = "lightblue"
        const skyEl = ctx.fillRect(250, 0, 750, 400)

        // Lage bakken
        ctx.fillStyle = "green"
        const groundEl = ctx.fillRect(250, 400, 750, 200)

        const cowIcon = document.getElementById("cow-icon")
        const ICONWIDTH = 125
        let ICONHEIGHT
        cowIcon.onload = function () {
            ICONHEIGHT = (cowIcon.naturalHeight / cowIcon.naturalWidth) * ICONWIDTH
            const x = (250 - ICONWIDTH) / 2
            const y = 50
            ctx.drawImage(cowIcon, x, y, ICONWIDTH, ICONHEIGHT)
        }

        /* HVIS MAN TRYKKER PÅ ET IKON, BLIR DET VALGT */
        let selectedIcon = null
        canvas.addEventListener("click", function (e) {
            const rect = canvas.getBoundingClientRect() // getBoundingClientRect = sjekker posisjonen til cow-icon når man trykker på den (før den flyttes)
            const mx = e.clientX - rect.left /* mx = move x */
            const my = e.clientY - rect.top

            // Klikket innenfor ikonet?
            if (mx < 250 && my > 50 && my < 50 + ICONHEIGHT) {
                selectedIcon = "cow"
                return
            }

            // Klikket i tegneområdet med valgt ikon?
            if (selectedIcon && mx > 250 + ICONWIDTH/2) { /* 250 + ICONWIDTH/2 gjør at kua ikke kan komme over på icon-boxen */
                ctx.drawImage(cowIcon, mx - ICONWIDTH/2, my - ICONHEIGHT/2, ICONWIDTH, ICONHEIGHT) /* slik at bildet blir plassert på midten der musen klikker */
            }
        })

    </script>
</body>

</html>
