<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="container">
            <div class="logo"><img src="./images/logo.png" alt="logo"></div>
            <div class="nav-links">
                <a href="#" class="nav-active">Hjem</a>
                <a href="#">Produkter</a>
                <a href="#">Inspirasjon</a>
                <a href="#">Om oss</a>
            </div>
            <div class="nav-btns">
                <button class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="favourites"><i class="fa-solid fa-heart"></i></button>
                <button class="cart-icon"><i class="fa-solid fa-cart-shopping cart-icon"></i></button>
            </div>
        </div>

    </nav>

    <section class="side-1">
        <div class="container">
            <div class="text-box">
                <div class="nyKolleksjon">Ny kolleksjon ute nå</div>
                <h1>La kreativiteten blomstre</h1>
                <p>Alt du trenger til maling, håndverk og hobbyprosjekter</p>
                <div class="btn-container">
                    <button class="se-produkter-btn">Se alle produkter</button>
                    <button class="inspirasjons-btn">Inspirasjon</button>
                </div>
            </div>
        </div>
    </section>

    <section class="side-2">
        <div class="container">

            <div class="select-bar">
                <ul class="select">
                    <li class="select-active">Alle</li>
                    <li>DIY</li>
                    <li>Leker</li>
                    <li>Maletilbehør</li>
                </ul>
                <ul class="filter">
                    <li id="filterBtn">Filter <i class="fa-solid fa-sliders sliders-icon"></i></li>
                    <li id="sortByBtn">Sort by 
                        <i class="fa-solid fa-angle-down arrow-down"></i>
                        <i class="fa-solid fa-angle-up arrow-up"></i>
                    </li>
                </ul>
            </div>
        </div>

    </section>
</body>

</html>
