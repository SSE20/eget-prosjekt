<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSØK 1 - SLETT</title>

    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-content: center;

            margin: 0;
            overflow: hidden;
        }

        .container {
            display: flex;
        }

        .drawing-box {
            display: flex;
            flex-direction: column;
        }

        .sky-box {
            background-color: lightblue;
        }

        .ground-box {
            background-color: green;
        }

        .icon-box {
            background-color: grey;
            border-right: solid black 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas class="icon-box"></canvas>
        <div class="drawing-box">
            <canvas class="sky-box"></canvas>
            <canvas class="ground-box"></canvas>
        </div>
    </div>

    <img src="./images/cow-icon.png" alt="" id="cow-icon" style="display: none;">
    <!-- sånn at plassen i camvasen ikke blir tatt, men vi kan bruke js for å legge til bildet etterpå -->

    <script>
        const iconBox = document.querySelector(".icon-box")
        const ICONWIDTH = 250
        const ICONHEIGHT = 600
        iconBox.width = ICONWIDTH
        iconBox.height = ICONHEIGHT
        const Ictx = iconBox.getContext("2d")

        const skyBox = document.querySelector(".sky-box")
        const SKYWIDTH = 800
        const SKYHEIGHT = 400
        skyBox.width = SKYWIDTH
        skyBox.height = SKYHEIGHT
        const Sctx = skyBox.getContext("2d")

        const groundBox = document.querySelector(".ground-box")
        const GROUNDWIDTH = 800
        const GROUNDHEIGHT = 200
        groundBox.width = GROUNDWIDTH
        groundBox.height = GROUNDHEIGHT
        const Gctx = groundBox.getContext("2d")

        const cowIcon = document.getElementById("cow-icon")
        const maxWidth = 125
        // onload tegner/laster opp bildet i icon-boxen
        cowIcon.onload = function () {
            const imgWidth = maxWidth
            const cowHeight = (cowIcon.naturalHeight / cowIcon.naturalWidth) * imgWidth

            const x = (ICONWIDTH - imgWidth) / 2
            const y = (ICONHEIGHT - cowHeight) / 2

            Ictx.drawImage(cowIcon, x, y, imgWidth, cowHeight)
            console.log(cowIcon)


        }

</body>

</html>
