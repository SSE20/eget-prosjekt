<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSØK 2</title>

    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-content: center;

            margin: 0;
            overflow: hidden;
        }

        canvas{
            background-color: grey;
        }

        img{
            display: block;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas></canvas>
        
    </div>

    <img src="./images/cow-icon.png" alt="" id="cow-icon" style="display: none;"> <!-- none slik at den ikke synes/finnes utenfor canvasen -->

    <script>
        const canvas = document.querySelector("canvas")
        const WIDTH = 1000
        const HEIGHT = 600
        canvas.width = WIDTH
        canvas.height = HEIGHT
        const ctx = canvas.getContext("2d")

        // Deler boksen i drawing- og icon-box
        ctx.moveTo(250, 0) /* høyde: 600 og bredde (iconBox): 250 */
        ctx.lineTo(250, 600)
        ctx.stroke()

        // Lage himmelen
        ctx.fillStyle = "lightblue"
        const skyEl = ctx.fillRect(250, 0, 750, 400)

        // Lage bakken
        ctx.fillStyle = "green"
        const groundEl = ctx.fillRect(250, 400, 750, 200)
        
        const cowIcon = document.getElementById("cow-icon")
        cowIcon.onload = function() {
            const ICONWIDTH = 125
            const ICONHEIGHT = (cowIcon.naturalHeight / cowIcon.naturalWidth) * ICONWIDTH
            const x = (250 - ICONWIDTH) / 2
            const y = 50
            ctx.drawImage(cowIcon, x, y, ICONWIDTH, ICONHEIGHT)
        }

            ctx.fill()
        }

        cowIcon.addEventListener("click", function (e) {
            moveIcon(e.clientX, e.clientY)
            console.log(e)
        }) */

    </script>
</body>

</html>
